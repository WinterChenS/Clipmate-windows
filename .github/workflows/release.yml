name: Build & Release

on:
  push:
    tags:
      - 'v*'          # 匹配 v1.0.0、v1.2.3-beta 等格式
  workflow_dispatch:   # 保留手动触发，方便临时构建

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Windows Installer & Publish Release
    runs-on: windows-latest

    steps:
      # ── 1. 拉取代码 ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. 安装 Node.js ──────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. 安装 Rust ─────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # ── 4. 缓存 Rust 编译产物 ────────────────────
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── 5. 从 Tag 提取版本号并更新配置文件 ──────────
      - name: Update version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [[ -z "$TAG" || "$TAG" == "refs/heads/"* ]]; then
            TAG="v$(node -p "require('./package.json').version")"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # 更新 package.json
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

          # 更新 Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

          # 更新 tauri.conf.json
          node -e "const c=require('./src-tauri/tauri.conf.json'); c.version='$VERSION'; if(c.app.trayIcon) c.app.trayIcon.tooltip='ClipMate v$VERSION'; require('fs').writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(c, null, 2)+'\n')"

          echo "✅ 版本号已更新为: $VERSION"

      # ── 6. 安装前端依赖 ──────────────────────────
      - name: Install frontend dependencies
        run: npm install

      # ── 7. 编译 Tauri 应用 ───────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 8. 创建 GitHub Release 并上传安装包 ────
      - name: Create Release and upload artifacts
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ClipMate ${{ steps.version.outputs.version }}
          body: |
            ## ClipMate ${{ steps.version.outputs.version }}

            **Windows 安装包** (Tauri + Rust)

            ### 安装方式
            1. 下载下方安装包
            2. 双击运行安装向导
            3. 默认快捷键 `Ctrl+Shift+V` 唤起面板

            ### 更新日志
            - 详细更新内容请查看 [Commits](https://github.com/${{ github.repository }}/commits/main)

            ---
            *由 GitHub Actions 自动构建发布*
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
