name: Build & Release

on:
  push:
    tags:
      - 'v*'          # 匹配 v1.0.0、v1.2.3-beta 等格式
  workflow_dispatch:   # 保留手动触发，方便临时构建

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Windows Installer & Publish Release
    runs-on: windows-latest

    steps:
      # ── 1. 拉取代码 ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 获取完整历史，用于提取版本信息

      # ── 2. 安装 Node.js ──────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. 安装依赖 + 编译打包 ───────────────────
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build renderer & Package Electron app
        run: npm run pack

      # ── 4. 提取版本号（直接从 tag 读取，格式 v1.2.0）───
      - name: Extract version info
        id: version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          # workflow_dispatch 时没有 tag，fallback 到 package.json
          if [[ -z "$TAG" || "$TAG" == "refs/heads/"* ]]; then
            TAG="v$(node -p "require('./package.json').version")"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # ── 5. 创建 GitHub Release 并上传安装包 ────
      - name: Create Release and upload artifacts
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ClipMate ${{ steps.version.outputs.version }}
          body: |
            ## ClipMate ${{ steps.version.outputs.version }}

            **Windows 安装包** (NSIS)

            ### 安装方式
            1. 下载下方 `ClipMate-Setup-.exe`
            2. 双击运行安装向导
            3. 默认快捷键 `Ctrl+Shift+V` 唤起面板

            ### 更新日志
            - 详细更新内容请查看 [Commits](https://github.com/${{ github.repository }}/commits/main)

            ---
            *由 GitHub Actions 自动构建发布*
          files: |
            dist-electron/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
